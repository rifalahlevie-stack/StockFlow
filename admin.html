<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockFlow Admin - Professional Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f4f7fe; }
    </style>
</head>
<body class="text-slate-800">

    <div class="flex h-screen overflow-hidden">
        <aside class="w-80 bg-[#0b1437] text-white flex flex-col shadow-2xl">
            <div class="p-8 border-b border-white/10 flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-server"></i></div>
                <span class="text-xl font-bold tracking-tight">StockFlow <span class="text-indigo-400">Cloud</span></span>
            </div>
            <nav class="p-6 flex flex-col gap-4">
                <button onclick="showSection('master')" id="btnMaster" class="p-4 rounded-2xl bg-indigo-600 flex items-center gap-4 shadow-xl shadow-indigo-500/20">
                    <i class="fas fa-th-large"></i> <span class="font-bold text-sm">Master Database</span>
                </button>
                <button onclick="showSection('report')" id="btnReport" class="p-4 rounded-2xl hover:bg-white/5 flex items-center gap-4 transition text-slate-400">
                    <i class="fas fa-clipboard-list"></i> <span class="font-bold text-sm">Laporan Hasil User</span>
                </button>
            </nav>
        </aside>

        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white/80 backdrop-blur-md px-10 py-6 border-b border-slate-200 flex justify-between items-center">
                <div>
                    <h2 id="sectionTitle" class="text-2xl font-extrabold text-[#1b2559]">Master Database</h2>
                    <p class="text-xs text-slate-400 font-bold uppercase tracking-widest mt-1">Real-time Cloud Monitoring</p>
                </div>
                <div class="flex gap-3">
                    <button id="exportBtn" onclick="exportExcel()" class="hidden bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-2xl font-bold text-sm shadow-lg transition">
                        <i class="fas fa-file-excel mr-2"></i> EXPORT EXCEL
                    </button>
                    <button onclick="fetchCloudData()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-2xl font-bold text-sm shadow-lg transition">
                        <i class="fas fa-sync-alt mr-2"></i> REFRESH DATA
                    </button>
                </div>
            </header>

            <main class="p-10 overflow-y-auto">
                <div class="bg-white rounded-[40px] shadow-sm border border-slate-100 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b border-slate-100">
                            <tr class="text-slate-400 text-[10px] font-black uppercase tracking-[2px]">
                                <th class="px-8 py-5">Item ID</th>
                                <th class="px-8 py-5">Nama Produk</th>
                                <th class="px-8 py-5 text-center">Stok</th>
                                <th class="px-8 py-5">Vendor</th>
                                <th class="px-8 py-5">Expired</th>
                                <th class="px-8 py-5 text-center">Status</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="text-sm divide-y divide-slate-50 font-medium">
                            </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <script>
        const API_URL = 'https://sheetdb.io/api/v1/n42lfid7z6tlv';
        let allProducts = [];
        let currentMode = 'master'; // master atau report

        async function fetchCloudData() {
            try {
                const res = await fetch(API_URL);
                allProducts = await res.json();
                renderTable();
            } catch (err) { console.error(err); }
        }

        function showSection(mode) {
            currentMode = mode;
            document.getElementById('sectionTitle').innerText = mode === 'master' ? 'Master Database' : 'Laporan Hasil Input User';
            
            // Toggle Button Colors
            const bMaster = document.getElementById('btnMaster'), bReport = document.getElementById('btnReport');
            const exportBtn = document.getElementById('exportBtn');

            if(mode === 'master') {
                bMaster.className = "p-4 rounded-2xl bg-indigo-600 flex items-center gap-4 text-white shadow-xl shadow-indigo-500/20";
                bReport.className = "p-4 rounded-2xl hover:bg-white/5 flex items-center gap-4 text-slate-400";
                exportBtn.classList.add('hidden');
            } else {
                bReport.className = "p-4 rounded-2xl bg-indigo-600 flex items-center gap-4 text-white shadow-xl shadow-indigo-500/20";
                bMaster.className = "p-4 rounded-2xl hover:bg-white/5 flex items-center gap-4 text-slate-400";
                exportBtn.classList.remove('hidden');
            }
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            let data = [...allProducts];

            // Filter jika masuk mode report (Hanya yang sudah ada tanggalnya)
            if (currentMode === 'report') {
                data = data.filter(i => {
                    const ex = i.tgl_expired || i.TglExpired || "";
                    return ex !== "" && ex !== "-";
                });
            }

            tbody.innerHTML = data.map(i => `
                <tr class="hover:bg-slate-50 transition">
                    <td class="px-8 py-5 font-bold text-indigo-600">#${i.item_id || i.ItemID}</td>
                    <td class="px-8 py-5 font-extrabold text-[#1b2559]">${i.produk || i.Produk}</td>
                    <td class="px-8 py-5 text-center font-black text-xl">${i.stok || i.Stok}</td>
                    <td class="px-8 py-5 text-slate-500">${i.vendor || i.Vendor || '-'}</td>
                    <td class="px-8 py-5 font-bold ${i.tgl_expired === '-' ? 'text-amber-500' : 'text-slate-900'}">${i.tgl_expired || i.TglExpired || '-'}</td>
                    <td class="px-8 py-5 text-center">
                        <span class="px-3 py-1.5 rounded-full text-[9px] font-black tracking-widest uppercase ${parseInt(i.stok) < 10 ? 'bg-rose-100 text-rose-600' : 'bg-emerald-100 text-emerald-600'}">
                            ${parseInt(i.stok) < 10 ? 'KRITIS' : 'AMAN'}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        function exportExcel() {
            const dataToExport = allProducts.filter(i => {
                const ex = i.tgl_expired || i.TglExpired || "";
                return ex !== "" && ex !== "-";
            });

            if(dataToExport.length === 0) { alert("Tidak ada data untuk diekspor!"); return; }

            const worksheet = XLSX.utils.json_to_sheet(dataToExport);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Laporan Audit User");
            XLSX.writeFile(workbook, "StockFlow_Laporan_Audit_" + new Date().toLocaleDateString() + ".xlsx");
        }

        fetchCloudData();
    </script>
</body>
</html>
