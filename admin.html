<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockFlow Admin - Final Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f4f7fe; }
        .sidebar-bg { background-color: #0b1437; }
    </style>
</head>
<body class="text-slate-800">

    <div class="flex h-screen overflow-hidden">
        <aside class="w-80 sidebar-bg text-white flex flex-col shadow-2xl">
            <div class="p-8 border-b border-white/10 flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-database"></i></div>
                <span class="text-xl font-bold tracking-tight italic">StockFlow <span class="text-indigo-400">Admin</span></span>
            </div>
            <nav class="p-6 flex flex-col gap-4">
                <button onclick="showSection('master')" id="btnMaster" class="p-4 rounded-2xl bg-indigo-600 flex items-center gap-4 text-white shadow-xl">
                    <i class="fas fa-boxes"></i> <span class="font-bold text-sm">Master Database</span>
                </button>
                <button onclick="showSection('report')" id="btnReport" class="p-4 rounded-2xl hover:bg-white/5 flex items-center gap-4 transition text-slate-400">
                    <i class="fas fa-file-signature"></i> <span class="font-bold text-sm">Laporan Hasil User</span>
                </button>
            </nav>
        </aside>

        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white/80 backdrop-blur-md px-10 py-6 border-b border-slate-200 flex justify-between items-center">
                <div>
                    <h2 id="sectionTitle" class="text-2xl font-extrabold text-[#1b2559]">Master Database</h2>
                    <div id="apiStatus" class="mt-1 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
                        <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">Menghubungkan ke Cloud...</p>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button id="exportBtn" onclick="exportExcel()" class="hidden bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-2xl font-bold text-sm shadow-lg transition">
                        <i class="fas fa-download mr-2"></i> EXPORT EXCEL
                    </button>
                    <button onclick="fetchCloudData()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-2xl font-bold text-sm shadow-lg transition">
                        <i class="fas fa-sync-alt mr-2"></i> REFRESH
                    </button>
                </div>
            </header>

            <main class="p-10 overflow-y-auto">
                <div class="bg-white rounded-[32px] shadow-sm border border-slate-100 overflow-hidden">
                    <table class="w-full text-left">
                        <thead id="tableHead" class="bg-slate-50 border-b border-slate-100 font-black text-slate-400 text-[10px] uppercase tracking-widest">
                            </thead>
                        <tbody id="tableBody" class="text-sm divide-y divide-slate-50 font-medium">
                            <tr><td colspan="6" class="px-8 py-20 text-center opacity-30 italic font-bold">Mencoba memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <script>
        const API_URL = 'https://sheetdb.io/api/v1/n42lfid7z6tlv';
        let allProducts = [];
        let currentMode = 'master'; 

        // Fungsi Ambil Data (Sangat Stabil)
        async function fetchCloudData() {
            const statusDiv = document.getElementById('apiStatus');
            try {
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error("API Limit");
                
                const data = await res.json();
                allProducts = Array.isArray(data) ? data : [];

                // Update Status Indikator
                statusDiv.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500"></span><p class="text-[10px] text-emerald-500 font-black uppercase tracking-widest">Koneksi Berhasil: ${allProducts.length} Item</p>`;
                
                renderTable();
            } catch (err) {
                statusDiv.innerHTML = `<span class="w-2 h-2 rounded-full bg-rose-500"></span><p class="text-[10px] text-rose-500 font-black uppercase tracking-widest">Gagal Konek Ke Cloud</p>`;
                console.error(err);
            }
        }

        function showSection(mode) {
            currentMode = mode;
            document.getElementById('sectionTitle').innerText = mode === 'master' ? 'Master Database' : 'Laporan Hasil Input User';
            document.getElementById('exportBtn').classList.toggle('hidden', mode === 'master');
            
            // Toggle Sidebar Color
            document.getElementById('btnMaster').className = mode === 'master' ? "p-4 rounded-2xl bg-indigo-600 flex items-center gap-4 text-white shadow-xl" : "p-4 rounded-2xl hover:bg-white/5 flex items-center gap-4 transition text-slate-400";
            document.getElementById('btnReport').className = mode === 'report' ? "p-4 rounded-2xl bg-indigo-600 flex items-center gap-4 text-white shadow-xl" : "p-4 rounded-2xl hover:bg-white/5 flex items-center gap-4 transition text-slate-400";
            
            renderTable();
        }

        function renderTable() {
            const thead = document.getElementById('tableHead');
            const tbody = document.getElementById('tableBody');
            
            // 1. SET HEADER
            if (currentMode === 'master') {
                thead.innerHTML = `<tr><th class="px-8 py-5">Item ID</th><th class="px-8 py-5">Nama Produk</th><th class="px-8 py-5 text-center">Stok</th><th class="px-8 py-5">Vendor</th><th class="px-8 py-5 text-center">Status</th></tr>`;
            } else {
                thead.innerHTML = `<tr><th class="px-8 py-5">Item ID</th><th class="px-8 py-5">Nama Produk</th><th class="px-8 py-5 text-center">Hasil Stok</th><th class="px-8 py-5 text-indigo-600">Tanggal Expired</th><th class="px-8 py-5 text-center">Status</th></tr>`;
            }

            // 2. FILTER DATA (KHUSUS LAPORAN)
            let filtered = [...allProducts];
            if (currentMode === 'report') {
                filtered = filtered.filter(i => {
                    const ex = i.tgl_expired || i.TglExpired || i.expired || "";
                    return ex !== "" && ex !== "-";
                });
            }

            // 3. ISI TABEL
            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="px-8 py-20 text-center opacity-30 italic">Tidak ada data ditemukan.</td></tr>`;
                return;
            }

            tbody.innerHTML = filtered.map(i => {
                const id = i.item_id || i.ItemID || i.id || "-";
                const nama = i.produk || i.Produk || i.nama || "Tanpa Nama";
                const stok = parseInt(i.stok || i.Stok || 0);
                const vendor = i.vendor || i.Vendor || "-";
                const exp = i.tgl_expired || i.TglExpired || i.expired || "-";

                return `
                <tr class="hover:bg-slate-50 transition border-b border-slate-50">
                    <td class="px-8 py-5 font-bold text-indigo-600 tracking-tight">#${id}</td>
                    <td class="px-8 py-5 font-extrabold text-[#1b2559] uppercase">${nama}</td>
                    <td class="px-8 py-5 text-center font-black text-xl text-slate-800">${stok}</td>
                    ${currentMode === 'master' ? `<td class="px-8 py-5 font-bold text-slate-400">${vendor}</td>` : `<td class="px-8 py-5 font-bold text-indigo-600 bg-indigo-50/50">${exp}</td>`}
                    <td class="px-8 py-5 text-center">
                        <span class="px-3 py-1.5 rounded-full text-[9px] font-black tracking-widest uppercase ${stok < 10 ? 'bg-rose-100 text-rose-600' : 'bg-emerald-100 text-emerald-600'}">
                            ${stok < 10 ? 'KRITIS' : 'AMAN'}
                        </span>
                    </td>
                </tr>`;
            }).join('');
        }

        function exportExcel() {
            const dataToExport = allProducts.filter(i => {
                const ex = i.tgl_expired || i.TglExpired || "";
                return ex !== "" && ex !== "-";
            });
            const ws = XLSX.utils.json_to_sheet(dataToExport);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Laporan Audit");
            XLSX.writeFile(wb, `Laporan_Audit_${new Date().toLocaleDateString()}.xlsx`);
        }

        // Panggil saat awal buka
        fetchCloudData();
    </script>
</body>
</html>
