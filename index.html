<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StockFlow User - 3 Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; -webkit-tap-highlight-color: transparent; }
        body.modal-open { overflow: hidden; overscroll-behavior: none; }
        .glass-header { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .item-card { background: white; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(0,0,0,0.03); }
        .item-card:active { transform: scale(0.96); background: #f1f5f9; }
        .sheet-container { transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1); will-change: transform; cursor: grab; }
        .sheet-down { transform: translateY(105%); }
        .sheet-up { transform: translateY(0); }
        .drag-handle { width: 40px; height: 5px; background: #e2e8f0; border-radius: 10px; margin: -10px auto 25px auto; }
        .no-select { user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body class="text-slate-900">

    <header class="glass-header text-white p-6 pb-8 rounded-b-[40px] sticky top-0 z-40 shadow-xl">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-extrabold italic tracking-tight">StockFlow <span class="text-indigo-400">User</span></h1>
            <button onclick="loadData()" class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center"><i class="fas fa-redo-alt text-xs"></i></button>
        </div>

        <div class="relative bg-black/20 p-1 rounded-2xl flex gap-1 text-[9px] font-black uppercase tracking-tighter">
            <button onclick="switchTab('all')" id="tabAll" class="flex-1 py-3 rounded-xl bg-indigo-600 text-white shadow-lg transition-all">Semua</button>
            <button onclick="switchTab('audit')" id="tabAudit" class="flex-1 py-3 rounded-xl text-slate-400 transition-all">Input Exp</button>
            <button onclick="switchTab('result')" id="tabResult" class="flex-1 py-3 rounded-xl text-slate-400 transition-all">Hasil Stok</button>
        </div>
    </header>

    <main class="p-6">
        <div class="mb-6 relative">
            <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input type="text" id="searchInput" onkeyup="filterData()" placeholder="Cari Nama atau ID..." class="w-full bg-white border-none rounded-3xl py-4.5 pl-14 shadow-sm font-bold text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <div id="itemList" class="space-y-4">
            <div class="text-center py-20 opacity-20"><i class="fas fa-circle-notch fa-spin text-3xl"></i></div>
        </div>
    </main>

    <div id="modalOverlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 hidden flex items-end opacity-0 transition-opacity duration-300">
        <div id="modalContent" class="sheet-container bg-white w-full rounded-t-[50px] p-10 pb-12 sheet-down">
            <div class="drag-handle"></div>
            <div class="mb-10 text-center">
                <span id="mIdDisplay" class="bg-indigo-50 text-indigo-600 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">#ID</span>
                <h3 id="mNama" class="text-2xl font-black text-slate-900 mt-5 leading-tight uppercase">Produk</h3>
            </div>
            <form id="updateForm" class="space-y-8">
                <input type="hidden" id="formId">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block text-center mb-3 italic">Update Stok Fisik</label>
                    <div class="flex items-center justify-between bg-slate-50 rounded-[35px] p-2 border border-slate-100 shadow-inner">
                        <button type="button" onclick="adjustStok(-1)" class="w-16 h-16 bg-white rounded-[26px] shadow-sm flex items-center justify-center text-indigo-600 text-xl active:scale-75 transition-all"><i class="fas fa-minus"></i></button>
                        <input type="number" id="fStok" class="w-24 bg-transparent text-center font-black text-4xl text-slate-900 border-none focus:ring-0">
                        <button type="button" onclick="adjustStok(1)" class="w-16 h-16 bg-white rounded-[26px] shadow-sm flex items-center justify-center text-indigo-600 text-xl active:scale-75 transition-all"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block text-center mb-3 italic">Tentukan Tanggal Expired</label>
                    <input type="date" id="fExp" class="w-full bg-slate-50 p-5 rounded-[28px] font-bold text-center text-slate-700 border border-slate-100 focus:ring-4 focus:ring-indigo-500/10 outline-none">
                </div>
                <button type="submit" id="saveBtn" class="w-full py-6 bg-indigo-600 text-white rounded-[32px] font-black shadow-2xl shadow-indigo-200 text-xs tracking-[3px] mt-4 active:scale-95 transition-all uppercase">Simpan Perubahan</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://sheetdb.io/api/v1/n42lfid7z6tlv';
        let allItems = [];
        let currentTab = 'all';

        // SWIPE ENGINE
        const modal = document.getElementById('modalContent');
        const overlay = document.getElementById('modalOverlay');
        let startY = 0, moveY = 0, isDragging = false;

        function dragStart(e) { if (e.target.closest('button') || e.target.closest('input')) return; isDragging = true; startY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY; modal.style.transition = 'none'; document.body.classList.add('no-select'); }
        function dragMove(e) { if (!isDragging) return; const currentY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY; moveY = currentY - startY; if (moveY > 0) { if (e.cancelable) e.preventDefault(); modal.style.transform = `translateY(${moveY}px)`; overlay.style.opacity = Math.max(0, 1 - (moveY / 500)); } }
        function dragEnd() { if (!isDragging) return; isDragging = false; document.body.classList.remove('no-select'); modal.style.transition = 'transform 0.5s cubic-bezier(0.32, 0.72, 0, 1)'; if (moveY > 150) closeModal(); else { modal.style.transform = 'translateY(0)'; overlay.style.opacity = '1'; } moveY = 0; }
        modal.addEventListener('touchstart', dragStart, { passive: true }); window.addEventListener('touchmove', dragMove, { passive: false }); window.addEventListener('touchend', dragEnd); modal.addEventListener('mousedown', dragStart); window.addEventListener('mousemove', dragMove); window.addEventListener('mouseup', dragEnd);

        async function loadData() { try { const res = await fetch(API_URL); allItems = await res.json(); filterData(); } catch (e) { console.error(e); } }

        function switchTab(tab) {
            currentTab = tab;
            const bA = document.getElementById('tabAll'), bB = document.getElementById('tabAudit'), bC = document.getElementById('tabResult');
            [bA, bB, bC].forEach(b => { b.className = "flex-1 py-3 rounded-xl text-slate-400 transition-all"; });
            if(tab === 'all') bA.className = "flex-1 py-3 rounded-xl bg-indigo-600 text-white shadow-lg transition-all";
            if(tab === 'audit') bB.className = "flex-1 py-3 rounded-xl bg-indigo-600 text-white shadow-lg transition-all";
            if(tab === 'result') bC.className = "flex-1 py-3 rounded-xl bg-indigo-600 text-white shadow-lg transition-all";
            filterData();
        }

        function filterData() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            let data = [...allItems];
            
            if (currentTab === 'audit') {
                data = data.filter(i => { const ex = i.tgl_expired || i.TglExpired || ""; return ex === "" || ex === "-"; });
            } else if (currentTab === 'result') {
                data = data.filter(i => { const ex = i.tgl_expired || i.TglExpired || ""; return ex !== "" && ex !== "-"; });
            }

            const filtered = data.filter(i => (i.produk || i.Produk || "").toLowerCase().includes(q) || (i.item_id || i.ItemID || "").toString().toLowerCase().includes(q));
            renderItems(filtered);
        }

        function renderItems(data) {
            const container = document.getElementById('itemList');
            if(data.length === 0) { container.innerHTML = `<div class="text-center py-20 text-slate-300 text-[10px] font-black uppercase tracking-widest italic">Data Kosong</div>`; return; }
            container.innerHTML = data.map(i => {
                const id = i.item_id || i.ItemID || "-";
                const nama = i.produk || i.Produk || "N/A";
                const stok = parseInt(i.stok || i.Stok) || 0;
                const exp = i.tgl_expired || i.TglExpired || "-";
                return `
                <div class="item-card p-6 rounded-[35px] flex items-center justify-between shadow-sm" onclick="openModal('${id}', '${nama}', ${stok}, '${exp}')">
                    <div class="flex items-center gap-5">
                        <div class="w-14 h-14 bg-slate-50 text-indigo-500 rounded-3xl flex items-center justify-center text-xl shadow-inner"><i class="fas fa-box"></i></div>
                        <div>
                            <h4 class="font-bold text-slate-900 text-[14px] leading-tight uppercase">${nama}</h4>
                            <p class="text-[9px] text-slate-400 font-black mt-2 tracking-widest uppercase">ID: #${id} • <span class="${exp === '-' ? 'text-amber-500' : 'text-indigo-400'}">${exp === '-' ? 'Minta Input' : exp}</span></p>
                        </div>
                    </div>
                    <span class="text-2xl font-black ${stok < 10 ? 'text-rose-500' : 'text-indigo-600'}">${stok}</span>
                </div>`;
            }).join('');
        }

        function openModal(id, nama, stok, exp) { moveY = 0; modal.style.transition = 'none'; modal.style.transform = 'translateY(100%)'; overlay.style.opacity = '0'; document.getElementById('formId').value = id; document.getElementById('mIdDisplay').innerText = "ID: #" + id; document.getElementById('mNama').innerText = nama; document.getElementById('fStok').value = stok; document.getElementById('fExp').value = (exp === "-" || exp === "") ? "" : exp; document.body.classList.add('modal-open'); overlay.classList.remove('hidden'); setTimeout(() => { overlay.style.opacity = '1'; modal.style.transition = 'transform 0.5s cubic-bezier(0.32, 0.72, 0, 1)'; modal.classList.replace('sheet-down', 'sheet-up'); modal.style.transform = 'translateY(0)'; }, 10); }
        function closeModal() { modal.style.transition = 'transform 0.4s cubic-bezier(0.32, 0.72, 0, 1)'; modal.style.transform = 'translateY(105%)'; overlay.style.opacity = '0'; setTimeout(() => { overlay.classList.add('hidden'); document.body.classList.remove('modal-open'); modal.classList.replace('sheet-up', 'sheet-down'); }, 400); }
        function adjustStok(v) { const el = document.getElementById('fStok'); el.value = Math.max(0, parseInt(el.value) + v); }

        document.getElementById('updateForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.innerText = 'PROSES...'; btn.disabled = true;
            try {
                const res = await fetch(`${API_URL}/item_id/${document.getElementById('formId').value}`, {
                    method: 'PATCH',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ "stok": document.getElementById('fStok').value, "tgl_expired": document.getElementById('fExp').value })
                });
                if(res.ok) { closeModal(); await loadData(); }
            } catch (err) { alert("Gagal!"); } finally { btn.innerText = 'Simpan Perubahan'; btn.disabled = false; }
        };
        loadData();
    </script>
</body>
</html>
